---
name: mvn
'on':
  push:
    branches:
      - master
    paths-ignore: [ 'README.md' ]
  pull_request:
    branches:
      - master
    paths-ignore: [ 'README.md' ]
concurrency:
  group: mvn-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  mvn:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ubuntu-zulu-jdk-25-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ubuntu-zulu-jdk-25-maven-
      - run: mvn clean test --errors --batch-mode
